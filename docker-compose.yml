version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gaming_user
      POSTGRES_PASSWORD: gaming_pass
      POSTGRES_DB: gaming_club
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaming_user -d gaming_club"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://gaming_user:gaming_pass@db:5432/gaming_club
      SECRET_KEY: your-super-secret-key-change-in-production-min-32-chars
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      RATE_LIMIT_PER_MINUTE: 100
      ENVIRONMENT: production
      YANDEX_MAPKIT_API_KEY: ${YANDEX_MAPKIT_API_KEY:-your-yandex-mapkit-api-key-here}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
